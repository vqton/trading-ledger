{% extends "base.html" %}

{% block title %}Quản lý vai trò{% endblock %}

{% block content %}
<div class="py-4">
    <h1 class="h3 mb-4">Quản lý vai trò</h1>
    
    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Tên vai trò</th>
                        <th>Mô tả</th>
                        <th>Số người dùng</th>
                    </tr>
                </thead>
                <tbody>
                    {% for role in roles %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ role.name }}</td>
                        <td>{{ role.description or '-' }}</td>
                        <td>{{ role.users|length }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
