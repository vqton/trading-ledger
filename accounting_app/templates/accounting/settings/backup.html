{% extends "base.html" %}

{% block title %}Cài đặt sao lưu - VAS Accounting{% endblock %}

{% block page_title %}Cài đặt sao lưu{% endblock %}

{% block main_content %}
<div class="card">
    <div class="card-header">
        <h5>Cài đặt sao lưu</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="backup_enabled" id="backup_enabled" {% if settings.backup_enabled %}checked{% endif %}>
                    <label class="form-check-label" for="backup_enabled">
                        Bật tự động sao lưu
                    </label>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Thời gian lưu trữ (ngày)</label>
                    <input type="number" class="form-control" name="backup_retention_days" value="{{ settings.backup_retention_days }}" min="1">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tần suất sao lưu</label>
                    <select class="form-select" name="auto_backup_frequency">
                        <option value="daily" {% if settings.auto_backup_frequency == 'daily' %}selected{% endif %}>Hàng ngày</option>
                        <option value="weekly" {% if settings.auto_backup_frequency == 'weekly' %}selected{% endif %}>Hàng tuần</option>
                        <option value="monthly" {% if settings.auto_backup_frequency == 'monthly' %}selected{% endif %}>Hàng tháng</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Lưu cài đặt
            </button>
            <a href="{{ url_for('settings.index') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Quay lại
            </a>
        </form>
    </div>
</div>
{% endblock %}
