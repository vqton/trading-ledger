{% extends "base.html" %}

{% block title %}Cài đặt - VAS Accounting{% endblock %}

{% block content %}
<h1 class="mt-4"><i class="fas fa-cog"></i> Cài đặt</h1>
<ol class="breadcrumb mb-4">
    <li class="breadcrumb-item"><a href="{{ url_for('index') }}">Trang chủ</a></li>
    <li class="breadcrumb-item active">Cài đặt</li>
</ol>

<div class="row">
    <div class="col-md-3">
        <div class="list-group">
            <a href="{{ url_for('settings.company') }}" class="list-group-item list-group-item-action {{ 'active' if active_tab == 'company' else '' }}">
                <i class="fas fa-building"></i> Thông tin công ty
            </a>
            <a href="{{ url_for('settings.accounting') }}" class="list-group-item list-group-item-action {{ 'active' if active_tab == 'accounting' else '' }}">
                <i class="fas fa-calculator"></i> Cài đặt kế toán
            </a>
            <a href="{{ url_for('settings.approval') }}" class="list-group-item list-group-item-action {{ 'active' if active_tab == 'approval' else '' }}">
                <i class="fas fa-check-circle"></i> Cài đặt phê duyệt
            </a>
            <a href="{{ url_for('settings.backup') }}" class="list-group-item list-group-item-action {{ 'active' if active_tab == 'backup' else '' }}">
                <i class="fas fa-database"></i> Sao lưu dữ liệu
            </a>
        </div>
    </div>
    <div class="col-md-9">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <i class="fas fa-info-circle"></i> {{ section_title }}
            </div>
            <div class="card-body">
                {% block settings_content %}{% endblock %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
