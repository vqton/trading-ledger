{% extends "accounting/settings/index.html" %}

{% block settings_content %}
<form method="post">
    <div class="row mb-3">
        <div class="col-md-4">
            <label class="form-label">Năm tài chính bắt đầu</label>
            <select name="fiscal_year_start" class="form-select">
                <option value="1" {{ 'selected' if settings and settings.fiscal_year_start == 1 else '' }}>Tháng 1</option>
                <option value="4" {{ 'selected' if not settings or settings.fiscal_year_start == 4 else '' }}>Tháng 4</option>
                <option value="7" {{ 'selected' if settings and settings.fiscal_year_start == 7 else '' }}>Tháng 7</option>
                <option value="10" {{ 'selected' if settings and settings.fiscal_year_start == 10 else '' }}>Tháng 10</option>
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Đơn vị tiền tệ</label>
            <select name="currency" class="form-select">
                <option value="VND" {{ 'selected' if not settings or settings.currency == 'VND' else '' }}>VND - Việt Nam Đồng</option>
                <option value="USD" {{ 'selected' if settings and settings.currency == 'USD' else '' }}>USD - US Dollar</option>
                <option value="EUR" {{ 'selected' if settings and settings.currency == 'EUR' else '' }}>EUR - Euro</option>
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Số thập phân</label>
            <input type="number" name="decimal_places" class="form-control" value="{{ settings.decimal_places if settings else 0 }}">
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">Thuế VAT mặc định (%)</label>
            <input type="number" name="default_vat_rate" class="form-control" step="0.01" value="{{ settings.default_vat_rate if settings else 10 }}">
        </div>
        <div class="col-md-6">
            <label class="form-label">Số ký tự phiếu</label>
            <input type="number" name="voucher_prefix_length" class="form-control" value="{{ settings.voucher_prefix_length if settings else 4 }}">
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <label class="form-label">Tài khoản tiền mặt mặc định</label>
            <input type="text" name="default_cash_account" class="form-control" value="{{ settings.default_cash_account if settings else '1111' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label">Tài khoản ngân hàng mặc định</label>
            <input type="text" name="default_bank_account" class="form-control" value="{{ settings.default_bank_account if settings else '1121' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label">Tài khoản doanh thu mặc định</label>
            <input type="text" name="default_revenue_account" class="form-control" value="{{ settings.default_revenue_account if settings else '5111' }}">
        </div>
    </div>

    <div class="form-check mb-3">
        <input type="checkbox" name="auto_post_journal" class="form-check-input" id="auto_post" {{ 'checked' if settings and settings.auto_post_journal else '' }}>
        <label class="form-check-label" for="auto_post">Tự động ghi sổ chứng từ</label>
    </div>

    <div class="form-check mb-3">
        <input type="checkbox" name="allow_negative_stock" class="form-check-input" id="neg_stock" {{ 'checked' if settings and settings.allow_negative_stock else '' }}>
        <label class="form-check-label" for="neg_stock">Cho phép tồn kho âm</label>
    </div>

    <div class="mt-3 d-grid gap-2 d-md-flex justify-content-md-end">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Lưu thay đổi
        </button>
    </div>
</form>
{% endblock %}
