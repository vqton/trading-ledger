{% extends "base.html" %}

{% block title %}Cài đặt phê duyệt - VAS Accounting{% endblock %}

{% block page_title %}Cài đặt phê duyệt{% endblock %}

{% block main_content %}
<div class="card">
    <div class="card-header">
        <h5>Cài đặt phê duyệt</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="require_approval" id="require_approval" {% if settings.require_approval %}checked{% endif %}>
                    <label class="form-check-label" for="require_approval">
                        Yêu cầu phê duyệt chứng từ
                    </label>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Ngưỡng phê duyệt (VNĐ)</label>
                <input type="number" class="form-control" name="approval_threshold" value="{{ settings.approval_threshold }}" min="0">
                <div class="form-text">Chứng từ có giá trị vượt ngưỡng này sẽ cần phê duyệt</div>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Lưu cài đặt
            </button>
            <a href="{{ url_for('settings.index') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Quay lại
            </a>
        </form>
    </div>
</div>
{% endblock %}
