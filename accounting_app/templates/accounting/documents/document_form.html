{% extends "base.html" %}

{% block title %}{{ 'Sửa' if document else 'Tạo' }} tài liệu - VAS Accounting{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-upload"></i> {{ 'Sửa' if document else 'Tải lên' }} tài liệu</h1>
    <a href="{{ url_for('documents.documents') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Quay lại
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            <div class="row mb-3">
                <div class="col-md-8">
                    <label class="form-label">Tên tài liệu <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" value="{{ document.name if document else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Danh mục</label>
                    <select name="category_id" class="form-select">
                        <option value="">Chọn danh mục</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {{ 'selected' if document and document.category_id == cat.id else '' }}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            {% if not document %}
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label">File <span class="text-danger">*</span></label>
                    <input type="file" name="file" class="form-control" required>
                </div>
            </div>
            {% endif %}

            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label">Mô tả</label>
                    <textarea name="description" class="form-control" rows="3">{{ document.description if document else '' }}</textarea>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Gắn thẻ</label>
                    <input type="text" name="tags" class="form-control" value="{{ document.tags if document else '' }}" placeholder="tag1, tag2, tag3">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Chia sẻ với</label>
                    <select name="visibility" class="form-select">
                        <option value="private" {{ 'selected' if document and document.visibility == 'private' else '' }}>Riêng tư</option>
                        <option value="team" {{ 'selected' if document and document.visibility == 'team' else '' }}>Nhóm</option>
                        <option value="public" {{ 'selected' if document and document.visibility == 'public' else '' }}>Công khai</option>
                    </select>
                </div>
            </div>

            <div class="mt-3 d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Lưu
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
