{% extends "base.html" %}

{% block title %}{{ 'Sửa' if template else 'Tạo' }} mẫu - VAS Accounting{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-file-code"></i> {{ 'Sửa' if template else 'Tạo' }} mẫu tài liệu</h1>
    <a href="{{ url_for('documents.templates') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Quay lại
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Tên mẫu <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" value="{{ template.name if template else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Loại mẫu</label>
                    <select name="template_type" class="form-select">
                        <option value="contract" {{ 'selected' if template and template.template_type == 'contract' else '' }}>Hợp đồng</option>
                        <option value="invoice" {{ 'selected' if template and template.template_type == 'invoice' else '' }}>Hóa đơn</option>
                        <option value="report" {{ 'selected' if template and template.template_type == 'report' else '' }}>Báo cáo</option>
                        <option value="letter" {{ 'selected' if template and template.template_type == 'letter' else '' }}>Công văn</option>
                        <option value="other" {{ 'selected' if template and template.template_type == 'other' else '' }}>Khác</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <textarea name="description" class="form-control" rows="2">{{ template.description if template else '' }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Nội dung mẫu</label>
                <textarea name="content" class="form-control" rows="15">{{ template.content if template else '' }}</textarea>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">File mẫu (nếu có)</label>
                    <input type="file" name="file" class="form-control">
                </div>
            </div>

            <div class="mt-3 d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Lưu
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
