{% extends "base.html" %}

{% block title %}Đánh dấu đã nộp{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-check-circle"></i> Đánh dấu đã nộp</h1>
    <a href="{{ url_for('tax_payment.index') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Quay lại
    </a>
</div>

<div class="card">
    <div class="card-body">
        <div class="alert alert-info">
            <strong>{{ payment.payment_no }}</strong> - {{ payment.tax_type }}
            <br>
            Số tiền: <strong>{{ "{:,.0f}".format(payment.total_amount) }}</strong>
        </div>

        <form method="post">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Ngày nộp thuế <span class="text-danger">*</span></label>
                    <input type="date" name="payment_date" class="form-control" value="{{ today }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phương thức thanh toán <span class="text-danger">*</span></label>
                    <select name="payment_method" class="form-select" required>
                        {% for value, label in payment_method_choices %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Số giao dịch ngân hàng</label>
                <input type="text" name="bank_transaction_no" class="form-control">
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-check"></i> Xác nhận đã nộp
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
