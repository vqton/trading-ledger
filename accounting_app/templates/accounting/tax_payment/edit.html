{% extends "base.html" %}

{% block title %}Sửa nộp thuế{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-edit"></i> Sửa nộp thuế</h1>
    <a href="{{ url_for('tax_payment.index') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Quay lại
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Số nộp thuế</label>
                    <input type="text" class="form-control" value="{{ payment.payment_no }}" disabled>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Loại thuế</label>
                    <select name="tax_type" class="form-select" disabled>
                        {% for value, label in tax_type_choices %}
                        <option value="{{ value }}" {% if value == payment.tax_type %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Năm</label>
                    <input type="number" class="form-control" value="{{ payment.period_year }}" disabled>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Kỳ tháng</label>
                    <input type="number" name="period_month" class="form-control" min="1" max="12" value="{{ payment.period_month or '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Kỳ quý</label>
                    <select name="period_quarter" class="form-select">
                        <option value="">Chọn quý</option>
                        <option value="1" {% if payment.period_quarter == 1 %}selected{% endif %}>Q1</option>
                        <option value="2" {% if payment.period_quarter == 2 %}selected{% endif %}>Q2</option>
                        <option value="3" {% if payment.period_quarter == 3 %}selected{% endif %}>Q3</option>
                        <option value="4" {% if payment.period_quarter == 4 %}selected{% endif %}>Q4</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Trạng thái</label>
                    <select name="payment_status" class="form-select">
                        {% for value, label in status_choices %}
                        <option value="{{ value }}" {% if value == payment.payment_status %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Số tiền chịu thuế</label>
                    <input type="number" name="taxable_amount" class="form-control" step="0.01" value="{{ payment.taxable_amount or 0 }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Thuế suất</label>
                    <input type="number" name="tax_rate" class="form-control" step="0.0001" value="{{ payment.tax_rate or 0 }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Số tiền thuế</label>
                    <input type="number" name="tax_amount" class="form-control" step="0.01" value="{{ payment.tax_amount or 0 }}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Tiền lãi</label>
                    <input type="number" name="interest_amount" class="form-control" step="0.01" value="{{ payment.interest_amount or 0 }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Tiền phạt</label>
                    <input type="number" name="penalty_amount" class="form-control" step="0.01" value="{{ payment.penalty_amount or 0 }}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Ngày nộp thuế</label>
                    <input type="date" name="payment_date" class="form-control" value="{{ payment.payment_date.strftime('%Y-%m-%d') if payment.payment_date else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Ngày đến hạn</label>
                    <input type="date" name="due_date" class="form-control" value="{{ payment.due_date.strftime('%Y-%m-%d') if payment.due_date else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Phương thức</label>
                    <select name="payment_method" class="form-select">
                        {% for value, label in payment_method_choices %}
                        <option value="{{ value }}" {% if value == payment.payment_method %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Số giao dịch ngân hàng</label>
                    <input type="text" name="bank_transaction_no" class="form-control" value="{{ payment.bank_transaction_no or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Cơ quan thuế</label>
                    <input type="text" name="tax_authority" class="form-control" value="{{ payment.tax_authority or '' }}">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Số tờ khai</label>
                    <input type="text" name="declaration_no" class="form-control" value="{{ payment.declaration_no or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ngày tờ khai</label>
                    <input type="date" name="declaration_date" class="form-control" value="{{ payment.declaration_date.strftime('%Y-%m-%d') if payment.declaration_date else '' }}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Ghi chú</label>
                <textarea name="notes" class="form-control" rows="3">{{ payment.notes or '' }}</textarea>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Lưu
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
