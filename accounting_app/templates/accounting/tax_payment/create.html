{% extends "base.html" %}

{% block title %}Tạo nộp thuế{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-plus-circle"></i> Tạo nộp thuế</h1>
    <a href="{{ url_for('tax_payment.index') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Quay lại
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Số nộp thuế</label>
                    <input type="text" name="payment_no" class="form-control" placeholder="Tự động tạo nếu để trống">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Loại thuế <span class="text-danger">*</span></label>
                    <select name="tax_type" class="form-select" required>
                        {% for value, label in tax_type_choices %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Năm <span class="text-danger">*</span></label>
                    <input type="number" name="period_year" class="form-control" value="{{ year }}" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Kỳ tháng</label>
                    <input type="number" name="period_month" class="form-control" min="1" max="12" placeholder="1-12">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Kỳ quý</label>
                    <select name="period_quarter" class="form-select">
                        <option value="">Chọn quý</option>
                        <option value="1">Q1</option>
                        <option value="2">Q2</option>
                        <option value="3">Q3</option>
                        <option value="4">Q4</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Trạng thái</label>
                    <select name="payment_status" class="form-select">
                        {% for value, label in status_choices %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <hr>
            <h5>Thông tin thuế</h5>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Số tiền chịu thuế</label>
                    <input type="number" name="taxable_amount" class="form-control" step="0.01" value="0.00">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Thuế suất (%)</label>
                    <input type="number" name="tax_rate" class="form-control" step="0.0001" value="0.00">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Số tiền thuế</label>
                    <input type="number" name="tax_amount" class="form-control" step="0.01" value="0.00">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Tiền lãi</label>
                    <input type="number" name="interest_amount" class="form-control" step="0.01" value="0.00">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Tiền phạt</label>
                    <input type="number" name="penalty_amount" class="form-control" step="0.01" value="0.00">
                </div>
            </div>

            <hr>
            <h5>Thông tin thanh toán</h5>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Ngày nộp thuế</label>
                    <input type="date" name="payment_date" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Ngày đến hạn</label>
                    <input type="date" name="due_date" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Phương thức</label>
                    <select name="payment_method" class="form-select">
                        {% for value, label in payment_method_choices %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Số giao dịch ngân hàng</label>
                    <input type="text" name="bank_transaction_no" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Cơ quan thuế</label>
                    <input type="text" name="tax_authority" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Số tờ khai</label>
                    <input type="text" name="declaration_no" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ngày tờ khai</label>
                    <input type="date" name="declaration_date" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Ghi chú</label>
                <textarea name="notes" class="form-control" rows="3"></textarea>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Lưu
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
