{% extends "base.html" %}

{% block title %}{{ 'Sửa' if dividend else 'Tạo' }} đợt chia cổ tức - VAS Accounting{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-plus-circle"></i> {{ 'Sửa' if dividend else 'Tạo' }} đợt chia cổ tức</h1>
    <a href="{{ url_for('dividends.index_list') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Quay lại
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Số đợt <span class="text-danger">*</span></label>
                    <input type="text" name="dividend_no" class="form-control" value="{{ dividend.dividend_no if dividend else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Năm tài chính <span class="text-danger">*</span></label>
                    <input type="number" name="fiscal_year" class="form-control" value="{{ dividend.fiscal_year if dividend else current_year }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Loại cổ tức</label>
                    <select name="dividend_type" class="form-select">
                        <option value="cash" {{ 'selected' if dividend and dividend.dividend_type == 'cash' else '' }}>Tiền mặt</option>
                        <option value="stock" {{ 'selected' if dividend and dividend.dividend_type == 'stock' else '' }}>Cổ phiếu</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Ngày công bố <span class="text-danger">*</span></label>
                    <input type="date" name="declaration_date" class="form-control" value="{{ dividend.declaration_date.strftime('%Y-%m-%d') if dividend and dividend.declaration_date else today }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Ngày thanh toán dự kiến</label>
                    <input type="date" name="payment_date" class="form-control" value="{{ dividend.payment_date.strftime('%Y-%m-%d') if dividend and dividend.payment_date else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Trạng thái</label>
                    <select name="status" class="form-select">
                        <option value="draft" {{ 'selected' if not dividend or dividend.status == 'draft' else '' }}>Nháp</option>
                        <option value="declared" {{ 'selected' if dividend and dividend.status == 'declared' else '' }}>Đã công bố</option>
                    </select>
                </div>
            </div>

            <hr>
            <h5>Thông tin cổ tức</h5>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Tổng số cổ phiếu</label>
                    <input type="number" name="total_shares" class="form-control" value="{{ dividend.total_shares if dividend else 0 }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Cổ tức / cổ phiếu</label>
                    <input type="number" name="dividend_per_share" class="form-control" step="0.01" value="{{ dividend.dividend_per_share if dividend else 0 }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Tổng cổ tức</label>
                    <input type="number" name="total_amount" class="form-control" step="0.01" value="{{ dividend.total_amount if dividend else 0 }}" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Tài khoản phải trả (TK 332)</label>
                    <input type="text" name="liability_account" class="form-control" value="{{ dividend.liability_account if dividend else '3321' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tài khoản chi (TK 112)</label>
                    <input type="text" name="payment_account" class="form-control" value="{{ dividend.payment_account if dividend else '1121' }}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Ghi chú</label>
                <textarea name="notes" class="form-control" rows="3">{{ dividend.notes if dividend else '' }}</textarea>
            </div>

            <div class="mt-3 d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Lưu
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
