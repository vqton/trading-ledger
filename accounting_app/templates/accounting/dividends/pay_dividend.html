{% extends "base.html" %}

{% block title %}Chi trả cổ tức - VAS Accounting{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-money-bill"></i> Chi trả cổ tức</h1>
</div>

<div class="card">
    <div class="card-header">
        <i class="fas fa-info-circle"></i> Thông tin chi trả
    </div>
    <div class="card-body">
        <form method="post">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Đợt cổ tức <span class="text-danger">*</span></label>
                    <select name="dividend_id" class="form-select" required>
                        <option value="">Chọn đợt cổ tức</option>
                        {% for d in dividends %}
                        <option value="{{ d.id }}">{{ d.dividend_no }} - {{ d.fiscal_year }} - {{ "{:,.0f}".format(d.total_amount - d.paid_amount) }} VND còn lại</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ngày chi trả <span class="text-danger">*</span></label>
                    <input type="date" name="payment_date" class="form-control" value="{{ today }}" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Cổ đông <span class="text-danger">*</span></label>
                    <select name="shareholder_id" class="form-select" required>
                        <option value="">Chọn cổ đông</option>
                        {% for s in shareholders %}
                        <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Số cổ phiếu</label>
                    <input type="number" name="shares" class="form-control" value="0">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Số tiền cổ tức <span class="text-danger">*</span></label>
                    <input type="number" name="amount" class="form-control" step="0.01" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Thuế TNCN</label>
                    <input type="number" name="tax_amount" class="form-control" step="0.01" value="0">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Thực nhận</label>
                    <input type="number" name="net_amount" class="form-control" step="0.01" id="net_amount" readonly>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Phương thức thanh toán</label>
                    <select name="payment_method" class="form-select">
                        <option value="cash">Tiền mặt</option>
                        <option value="bank">Chuyển khoản</option>
                        <option value="check">Sec</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Số chứng từ</label>
                    <input type="text" name="voucher_no" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Ghi chú</label>
                <textarea name="notes" class="form-control" rows="2"></textarea>
            </div>

            <div class="alert alert-info">
                <i class="fas fa-info-circle"></i>
                <strong>Lưu ý:</strong> Theo Thông tư 99/2025/TT-BTC, cổ tức được ghi nhận vào TK 332 (Phải trả cổ tức).
            </div>

            <div class="mt-3 d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-money-bill"></i> Chi trả cổ tức
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
