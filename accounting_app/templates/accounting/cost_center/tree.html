{% extends "base.html" %}

{% block main_content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Cost Center Hierarchy</h2>
    <a href="{{ url_for('cost_center.index') }}" class="btn btn-outline-secondary">List View</a>
  </div>

  <div class="card">
    <div class="card-body">
      {% if tree %}
      <ul class="list-unstyled">
        {% for node in tree %}
          {% include "accounting/cost_center/_tree_node.html" %}
        {% endfor %}
      </ul>
      {% else %}
      <p class="text-muted text-center py-4">No cost centers defined.</p>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
