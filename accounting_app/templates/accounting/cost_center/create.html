{% extends "base.html" %}

{% block main_content %}
<div class="container-fluid">
  <div class="mb-4">
    <h2>Create Cost Center</h2>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="row mb-3">
          <div class="col-md-6">
            <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" name="name" required>
          </div>
          <div class="col-md-6">
            <label for="code" class="form-label">Code</label>
            <input type="text" class="form-control" id="code" name="code">
          </div>
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <textarea class="form-control" id="description" name="description" rows="3"></textarea>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label for="parent_id" class="form-label">Parent Cost Center</label>
            <select class="form-select" id="parent_id" name="parent_id">
              <option value="">-- None --</option>
              {% if parent %}
              <option value="{{ parent.id }}" selected>{{ parent.code }} - {{ parent.name }}</option>
              {% endif %}
            </select>
          </div>
          <div class="col-md-6">
            <label for="department" class="form-label">Department</label>
            <select class="form-select" id="department" name="department">
              <option value="">-- Select --</option>
              {% for dept in departments %}
              <option value="{{ dept }}">{{ dept }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="mb-3">
          <label for="budget_allocated" class="form-label">Budget Allocated</label>
          <div class="input-group">
            <span class="input-group-text">VND</span>
            <input type="number" class="form-control" id="budget_allocated" name="budget_allocated" step="0.01" min="0" value="0">
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <a href="{{ url_for('accounting.cost_center_index') }}" class="btn btn-outline-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
