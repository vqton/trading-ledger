{% extends "base.html" %}

{% block title %}Sửa trung tâm chi phí{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-edit"></i> Sửa trung tâm chi phí</h1>
    <a href="{{ url_for('cost_center.index') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Quay lại
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Mã trung tâm chi phí</label>
                    <input type="text" class="form-control" value="{{ cost_center.code }}" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tên <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" value="{{ cost_center.name }}" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Phòng ban</label>
                    <input type="text" name="department" class="form-control" value="{{ cost_center.department or '' }}" list="departments">
                    <datalist id="departments">
                        {% for dept in departments %}
                        <option value="{{ dept }}">
                        {% endfor %}
                    </datalist>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Trung tâm cha</label>
                    <select name="parent_id" class="form-select">
                        <option value="">Không có</option>
                        {% for parent in parent_cost_centers if parent.id != cost_center.id %}
                        <option value="{{ parent.id }}" {% if parent.id == cost_center.parent_id %}selected{% endif %}>{{ parent.code }} - {{ parent.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Ngân sách phân bổ</label>
                    <input type="number" name="budget_allocated" class="form-control" step="0.01" value="{{ cost_center.budget_allocated or 0 }}">
                </div>
                <div class="col-md-6 d-flex align-items-center">
                    <div class="form-check">
                        <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if cost_center.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Hoạt động</label>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <textarea name="description" class="form-control" rows="3">{{ cost_center.description or '' }}</textarea>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Lưu
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
