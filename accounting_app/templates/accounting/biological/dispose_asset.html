{% extends "base.html" %}

{% block title %}Thanh lý tài sản - VAS Accounting{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-trash-alt"></i> Thanh lý tài sản sinh học</h1>
</div>

<div class="card">
    <div class="card-header">
        <i class="fas fa-info-circle"></i> Thông tin thanh lý
    </div>
    <div class="card-body">
        <form method="post">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Tài sản <span class="text-danger">*</span></label>
                    <select name="asset_id" class="form-select" required>
                        <option value="">Chọn tài sản</option>
                        {% for a in active_assets %}
                        <option value="{{ a.id }}">{{ a.asset_code }} - {{ a.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ngày thanh lý <span class="text-danger">*</span></label>
                    <input type="date" name="disposal_date" class="form-control" value="{{ today }}" required>
                </div>
            </div>

            <hr>
            <h5>Thông tin tài chính</h5>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Nguyên giá</label>
                    <input type="number" name="original_cost" class="form-control" step="0.01" id="original_cost" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Giá trị hợp lý hiện tại</label>
                    <input type="number" name="current_fair_value" class="form-control" step="0.01" id="current_fair_value" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Giá bán</label>
                    <input type="number" name="disposal_price" class="form-control" step="0.01" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Chi phí thanh lý</label>
                    <input type="number" name="disposal_cost" class="form-control" step="0.01" value="0">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Lãi/Lỗ thanh lý</label>
                    <input type="number" name="gain_loss" class="form-control" step="0.01" id="gain_loss" readonly>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Tài khoản thu (TK 711)</label>
                    <input type="text" name="revenue_account" class="form-control" value="7111">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tài khoản chi (TK 811)</label>
                    <input type="text" name="expense_account" class="form-control" value="8111">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Lý do thanh lý</label>
                <textarea name="reason" class="form-control" rows="3" required></textarea>
            </div>

            <div class="mt-3 d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-danger">
                    <i class="fas fa-trash"></i> Thanh lý tài sản
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
