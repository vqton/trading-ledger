{% extends "base.html" %}

{% block title %}Chỉnh sửa dự án: {{ project.code }}{% endblock %}
{% block page_title %}Chỉnh sửa dự án{% endblock %}

{% block main_content %}
<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Mã dự án</label>
                    <input type="text" class="form-control" value="{{ project.code }}" disabled>
                </div>
                <div class="col-md-8 mb-3">
                    <label class="form-label">Tên dự án <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" value="{{ project.name }}" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <textarea name="description" class="form-control" rows="3">{{ project.description or '' }}</textarea>
            </div>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Ngày bắt đầu</label>
                    <input type="date" name="start_date" class="form-control" value="{{ project.start_date }}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Ngày kết thúc</label>
                    <input type="date" name="end_date" class="form-control" value="{{ project.end_date }}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Dự kiến hoàn thành</label>
                    <input type="date" name="expected_completion_date" class="form-control" value="{{ project.expected_completion_date }}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Trạng thái</label>
                    <select name="status" class="form-select">
                        {% for value, label in status_choices %}
                        <option value="{{ value }}" {% if project.status == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Loại dự án</label>
                    <select name="project_type" class="form-select">
                        {% for value, label in type_choices %}
                        <option value="{{ value }}" {% if project.project_type == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Giá trị hợp đồng</label>
                    <input type="number" name="total_contract_value" class="form-control" step="0.01" value="{{ project.total_contract_value or 0 }}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Tiến độ (%)</label>
                    <input type="number" name="completion_percentage" class="form-control" step="0.01" min="0" max="100" value="{{ project.completion_percentage or 0 }}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">ID quản lý</label>
                    <input type="number" name="manager_id" class="form-control" value="{{ project.manager_id or '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">ID khách hàng</label>
                    <input type="number" name="customer_id" class="form-control" value="{{ project.customer_id or '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Trung tâm chi phí</label>
                    <select name="cost_center_id" class="form-select">
                        <option value="">-- Không chọn --</option>
                        {% for cc in cost_centers %}
                        <option value="{{ cc.id }}" {% if project.cost_center_id == cc.id %}selected{% endif %}>{{ cc.code }} - {{ cc.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4 mb-3 d-flex align-items-end">
                    <div class="form-check">
                        <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if project.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Đang hoạt động</label>
                    </div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i> Cập nhật
                </button>
                <a href="{{ url_for('project.view', project_id=project.id) }}" class="btn btn-outline-secondary">Hủy</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
