{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="py-4">
    <h1 class="h3 mb-4">{{ title }}</h1>
    
    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        {{ form.hidden_tag() }}
                        
                        <div class="row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="account_code" class="form-label">Mã tài khoản</label>
                                    <input type="text" class="form-control" id="account_code" 
                                           name="account_code" value="{{ form.account_code.data or '' }}"
                                           {% if account %}readonly{% endif %} required>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <div class="mb-3">
                                    <label for="account_name" class="form-label">Tên tài khoản</label>
                                    <input type="text" class="form-control" id="account_name" 
                                           name="account_name" value="{{ form.account_name.data or '' }}" required>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="account_type" class="form-label">Loại tài khoản</label>
                                    <select class="form-select" id="account_type" name="account_type" required>
                                        {% for choice in form.account_type.choices %}
                                        <option value="{{ choice[0] }}" {% if form.account_type.data == choice[0] %}selected{% endif %}>
                                            {{ choice[1] }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="parent_id" class="form-label">Tài khoản cha</label>
                                    <select class="form-select" id="parent_id" name="parent_id">
                                        {% for choice in form.parent_id.choices %}
                                        <option value="{{ choice[0] }}" {% if form.parent_id.data == choice[0] %}selected{% endif %}>
                                            {{ choice[1] }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="normal_balance" class="form-label">Số dư bình thường</label>
                                    <select class="form-select" id="normal_balance" name="normal_balance" required>
                                        {% for choice in form.normal_balance.choices %}
                                        <option value="{{ choice[0] }}" {% if form.normal_balance.data == choice[0] %}selected{% endif %}>
                                            {{ choice[1] }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3 mt-4">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="is_detail" 
                                               name="is_detail" {% if form.is_detail.data %}checked{% endif %}>
                                        <label class="form-check-label" for="is_detail">Tài khoản chi tiết</label>
                                    </div>
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="is_active" 
                                               name="is_active" {% if form.is_active.data or not form.is_active.data == false %}checked{% endif %}>
                                        <label class="form-check-label" for="is_active">Hoạt động</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-check-circle"></i> Lưu
                            </button>
                            <a href="{{ url_for('accounting.accounts') }}" class="btn btn-secondary">
                                <i class="fas fa-xmark"></i> Hủy
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
