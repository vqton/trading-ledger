{% extends "base.html" %}

{% block title %}Thêm chính sách thuế{% endblock %}

{% block content %}
<div class="py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Thêm chính sách thuế</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Loại thuế</label>
                            <select class="form-select" name="tax_type" required>
                                <option value="cit">Thuế TNDN</option>
                                <option value="vat">Thuế GTGT</option>
                                <option value="vat_input">Thuế GTGT vào</option>
                                <option value="vat_output">Thuế GTGT ra</option>
                                <option value="pit">Thuế TNCN</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Năm áp dụng</label>
                            <input type="number" class="form-control" name="year" value="{{ current_year }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Thuế suất (%)</label>
                            <input type="number" class="form-control" name="rate" step="0.01" min="0" max="100" placeholder="VD: 20" required>
                            <small class="text-muted">Nhập phần trăm, ví dụ: 20 cho 20%</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tên chính sách</label>
                            <input type="text" class="form-control" name="rate_name" placeholder="VD: Thuế suất TNDN thông thường">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('tax.policies') }}" class="btn btn-secondary">Hủy</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Lưu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
