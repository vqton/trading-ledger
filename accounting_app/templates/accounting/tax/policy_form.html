{% extends "base.html" %}

{% block title %}Thêm chính sách thuế{% endblock %}
{% block page_title %}Thêm chính sách thuế{% endblock %}

{% block main_content %}
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">Thông tin chính sách thuế</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('tax.policy_form') }}">
                    <input type="hidden" name="csrf_token" value="">
                    <div class="mb-3">
                        <label for="tax_type" class="form-label">Loại thuế <span class="text-danger">*</span></label>
                        <select class="form-select" id="tax_type" name="tax_type" required>
                            <option value="">-- Chọn loại thuế --</option>
                            <option value="vat">VAT - Thuế giá trị gia tăng</option>
                            <option value="cit">CIT - Thuế thu nhập doanh nghiệp</option>
                            <option value="pit">PIT - Thuế thu nhập cá nhân</option>
                            <option value="fct">FCT - Thuế nhà thầu nước ngoài</option>
                            <option value="other">Khác</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="year" class="form-label">Năm áp dụng <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="year" name="year" min="2000" max="2100" required>
                    </div>
                    <div class="mb-3">
                        <label for="rate" class="form-label">Mức thuế (%) <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="rate" name="rate" step="0.01" min="0" max="100" required>
                    </div>
                    <div class="mb-3">
                        <label for="rate_name" class="form-label">Tên mức thuế <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="rate_name" name="rate_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Mô tả</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i> Lưu
                        </button>
                        <a href="{{ url_for('tax.policies') }}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
