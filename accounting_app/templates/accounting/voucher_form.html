{% extends "base.html" %}

{% block title %}Tạo chứng từ - VAS Accounting{% endblock %}

{% block app_content %}
<div class="py-4">
<h1 class="h3 mb-4">Tạo chứng từ mới</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Số chứng từ</label>
                    <input type="text" class="form-control" name="voucher_no" value="{{ voucher_no }}" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Ngày chứng từ</label>
                    <input type="date" class="form-control" name="voucher_date" value="{{ today }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Đối tượng</label>
                    <input type="text" class="form-control" name="partner_name" placeholder="Khách hàng/Nhà cung cấp">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Diễn giải</label>
                <input type="text" class="form-control" name="description" required>
            </div>
            
            <h5>Danh sách định khoản</h5>
            <table class="table table-sm" id="entries-table">
                <thead>
                    <tr>
                        <th>Tài khoản</th>
                        <th>Diễn giải</th>
                        <th>Nợ</th>
                        <th>Có</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="entries-body">
                    <tr>
                        <td>
                            <select class="form-select" name="account_id[]">
                                <option value="">-- Chọn TK --</option>
                                {% for acc in accounts %}
                                <option value="{{ acc.id }}">{{ acc.code }} - {{ acc.name_vi }}</option>
                                {% endfor %}
                            </select>
                        </td>
                        <td><input type="text" class="form-control" name="entry_desc[]"></td>
                        <td><input type="number" class="form-control" name="debit[]" step="0.01" value="0"></td>
                        <td><input type="number" class="form-control" name="credit[]" step="0.01" value="0"></td>
                        <td><button type="button" class="btn btn-sm btn-danger" onclick="removeRow(this)"><i class="fas fa-trash"></i></button></td>
                    </tr>
                </tbody>
            </table>
            
            <button type="button" class="btn btn-secondary mb-3" onclick="addEntry()">
                <i class="fas fa-plus"></i> Thêm dòng
            </button>
            
            <div class="mb-3">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Lưu nháp
                </button>
                <button type="submit" formaction="{{ url_for('accounting.post_voucher') }}" class="btn btn-success">
                    <i class="fas fa-check"></i> Ghi sổ
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function addEntry() {
    const tbody = document.getElementById('entries-body');
    const row = document.createElement('tr');
    row.innerHTML = `
        <td>
            <select class="form-select" name="account_id[]">
                <option value="">-- Chọn TK --</option>
                {% for acc in accounts %}
                <option value="{{ acc.id }}">{{ acc.code }} - {{ acc.name_vi }}</option>
                {% endfor %}
            </select>
        </td>
        <td><input type="text" class="form-control" name="entry_desc[]"></td>
        <td><input type="number" class="form-control" name="debit[]" step="0.01" value="0"></td>
        <td><input type="number" class="form-control" name="credit[]" step="0.01" value="0"></td>
        <td><button type="button" class="btn btn-sm btn-danger" onclick="removeRow(this)"><i class="fas fa-trash"></i></button></td>
    `;
    tbody.appendChild(row);
}

function removeRow(btn) {
    const row = btn.closest('tr');
    row.remove();
}
</script>
</div>
</div>
{% endblock %}
