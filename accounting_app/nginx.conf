upstream accounting_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name accounting.yourcompany.com;

    client_max_body_size 16M;

    access_log /var/log/nginx/accounting_access.log;
    error_log /var/log/nginx/accounting_error.log;

    location /static/ {
        alias /mnt/e/acct/accounting_app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_pass http://accounting_app;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
